<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Engenharia Impossível - MidiaDG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cabecalho-placeholder"></div>

    <div class="main-wrapper">


        <main class="article-content">
            <span class="category-label">Pirâmides • Parte 1 de 10</span>
            <h1>A Engenharia Impossível das Pirâmides</h1>
            <img src="https://images.pexels.com/photos/259915/pexels-photo-259915.jpeg?auto=compress&cs=tinysrgb&w=800" class="featured-img" alt="Pirâmides">
            <div class="text-body">
                <p>As pirâmides de Gizé desafiam a lógica moderna. Como 2,3 milhões de blocos foram movidos com precisão milimétrica?</p>
            </div>
            <a href="p2.html" style="display: block; background: #1a1a1a; color: white; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 30px;">O Mistério do Alinhamento ➔</a>
        </main>



        <aside class="sidebar" id="sidebar-placeholder"></aside>
    </div>

    <div id="rodape-placeholder"></div>

    <script>
    function incluirComponentes() {
        // 1. Carrega Topo e Rodapé
        fetch('cabecalho.html').then(r => r.text()).then(d => document.getElementById('cabecalho-placeholder').innerHTML = d);
        fetch('rodape.html').then(r => r.text()).then(d => document.getElementById('rodape-placeholder').innerHTML = d);
        
        // 2. Carrega a Sidebar
        fetch('sidebar.html')
            .then(response => {
                if (!response.ok) throw new Error('Arquivo sidebar.html não encontrado');
                return response.text();
            })
            .then(data => {
                const container = document.getElementById('sidebar-placeholder');
                
                // Criamos um elemento invisível para organizar os cards
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = data;
                
                // Buscamos os cards que você colou no sidebar.html
                const cards = Array.from(tempDiv.querySelectorAll('.card'));
                
                if (cards.length > 0) {
                    // Embaralha os cards
                    cards.sort(() => Math.random() - 0.5);
                    
                    // Pega o título "Outros Assuntos"
                    const titulo = tempDiv.querySelector('.sidebar-title');
                    container.innerHTML = titulo ? titulo.outerHTML : '<div class="sidebar-title">Sugestões</div>';
                    
                    // Adiciona apenas os 3 primeiros sorteados
                    cards.slice(0, 3).forEach(card => {
                        container.appendChild(card);
                    });
                }
            })
            .catch(err => console.error('Erro na sidebar:', err));
    }
    window.onload = incluirComponentes;
</script>
</body>
</html>
