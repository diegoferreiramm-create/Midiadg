<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Engenharia Impossível - MidiaDG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cabecalho-placeholder"></div>

    <div class="main-wrapper">


        <main class="article-content">
            <span class="category-label">Pirâmides • Parte 1 de 10</span>
            <h1>A Engenharia Impossível das Pirâmides</h1>
            <img src="https://images.pexels.com/photos/259915/pexels-photo-259915.jpeg?auto=compress&cs=tinysrgb&w=800" class="featured-img" alt="Pirâmides">
            <div class="text-body">
                <p>As pirâmides de Gizé desafiam a lógica moderna. Como 2,3 milhões de blocos foram movidos com precisão milimétrica?</p>
            </div>
            <a href="p2.html" style="display: block; background: #1a1a1a; color: white; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 30px;">O Mistério do Alinhamento ➔</a>
        </main>



        <aside class="sidebar" id="sidebar-placeholder"></aside>
    </div>

    <div id="rodape-placeholder"></div>

  <script>
    function carregarComponente(arquivo, id, callback) {
        fetch(arquivo)
            .then(response => {
                if (!response.ok) throw new Error('Erro 404: ' + arquivo);
                return response.text();
            })
            .then(data => {
                const el = document.getElementById(id);
                if (el) {
                    el.innerHTML = data;
                    if (callback) callback(el, data);
                }
            })
            .catch(err => console.error(err));
    }

    function incluirComponentes() {
        // Carrega cada um de forma isolada (se um der erro, o outro funciona)
        carregarComponente('cabecalho.html', 'cabecalho-placeholder');
        carregarComponente('rodape.html', 'rodape-placeholder');
        
        carregarComponente('sidebar.html', 'sidebar-placeholder', (container, html) => {
            // Lógica do sorteio da Sidebar
            const temp = document.createElement('div');
            temp.innerHTML = html;
            
            // PROCURA POR .card OU .sidebar-item (ajustado para os dois)
            const itens = Array.from(temp.querySelectorAll('.card, .sidebar-item'));
            
            if (itens.length > 0) {
                itens.sort(() => Math.random() - 0.5);
                const titulo = temp.querySelector('.sidebar-title');
                container.innerHTML = titulo ? titulo.outerHTML : '';
                
                // Pega 3 aleatórios
                itens.slice(0, 3).forEach(card => container.appendChild(card));
            }
        });
    }

    window.onload = incluirComponentes;
</script>
</body>
</html>
