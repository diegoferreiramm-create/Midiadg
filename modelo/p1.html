<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Engenharia Impossível - MidiaDG</title>

    <link rel="icon" type="image/png" href="imag/favicon.png?v=2">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css"> 
</head>
<body>
    
    <div id="cabecalho-placeholder"></div>
    <div id="ads-topo-placeholder" style="max-width: 1200px; margin: 10px auto; text-align: center;"></div>
    <div class="main-wrapper">
        <main class="article-content">
            <span class="category-label">Pirâmides • Parte 1 de 10</span>
            <h1>A Engenharia Impossível das Pirâmides</h1>
            <img src="https://images.pexels.com/photos/259915/pexels-photo-259915.jpeg?auto=compress&cs=tinysrgb&w=800" class="featured-img" alt="Pirâmides">
            <div class="text-body">
                <p>As pirâmides de Gizé desafiam a lógica moderna...</p>
            </div>
            <a href="p2.html" style="display: block; background: #1a1a1a; color: white; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 30px;">O Mistério do Alinhamento ➔</a>
        </main>

        <aside class="sidebar" id="sidebar-placeholder">
            </aside>
    </div>

    
    <div id="ads-rodape-placeholder"></div>
    <div id="rodape-placeholder"></div>

   <script>
    function incluirComponentes() {
        // 1. Cabeçalho e Rodapé
        fetch('../cabecalho.html').then(r => r.text()).then(d => document.getElementById('cabecalho-placeholder').innerHTML = d);
        fetch('../rodape.html').then(r => r.text()).then(d => document.getElementById('rodape-placeholder').innerHTML = d);

        // 2. Carrega o ads.html e entrega no TOPO e no RODAPÉ
        fetch('../ads.html').then(r => r.text()).then(d => {
            const adsTopo = document.getElementById('ads-topo-placeholder');
            if (adsTopo) adsTopo.innerHTML = d;

            const adsRodape = document.getElementById('ads-rodape-placeholder');
            if (adsRodape) adsRodape.innerHTML = d;
            
            // Guardamos o conteúdo do anúncio para usar na Sidebar depois
            window.conteudoAnuncio = d; 
        }).catch(e => console.log("Aguardando anúncio..."));

        // 3. Sidebar com Sorteio + ANÚNCIO NA LATERAL
        fetch('../sidebar.html').then(r => r.text()).then(html => {
            const container = document.getElementById('sidebar-placeholder');
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            const cards = Array.from(tempDiv.querySelectorAll('.card'));

            if (cards.length > 0) {
                cards.sort(() => Math.random() - 0.5);
                const titulo = tempDiv.querySelector('.sidebar-title');
                container.innerHTML = titulo ? titulo.outerHTML : '<div class="sidebar-title">Outros Assuntos</div>';
                
                // Mostra os 3 cards sorteados
                cards.slice(0, 3).forEach(card => container.appendChild(card));

                // AGORA: Adiciona o anúncio logo abaixo dos cards na sidebar
                if (window.conteudoAnuncio) {
                    const adLateral = document.createElement('div');
                    adLateral.style.marginTop = "20px";
                    adLateral.innerHTML = window.conteudoAnuncio;
                    container.appendChild(adLateral);
                }
            }
        });
    }
    window.onload = incluirComponentes;
</script>
</body>
</html>
