<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Engenharia Impossível - MidiaDG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cabecalho-placeholder"></div>

    <div class="main-wrapper">


        <main class="article-content">
            <span class="category-label">Pirâmides • Parte 1 de 10</span>
            <h1>A Engenharia Impossível das Pirâmides</h1>
            <img src="https://images.pexels.com/photos/259915/pexels-photo-259915.jpeg?auto=compress&cs=tinysrgb&w=800" class="featured-img" alt="Pirâmides">
            <div class="text-body">
                <p>As pirâmides de Gizé desafiam a lógica moderna. Como 2,3 milhões de blocos foram movidos com precisão milimétrica?</p>
            </div>
            <a href="p2.html" style="display: block; background: #1a1a1a; color: white; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 30px;">O Mistério do Alinhamento ➔</a>
        </main>



        <aside class="sidebar" id="sidebar-placeholder"></aside>
    </div>

    <div id="rodape-placeholder"></div>

    <script>
    function incluirComponentes() {
        // Puxa o Topo e Rodapé
        fetch('cabecalho.html').then(r => r.text()).then(d => document.getElementById('cabecalho-placeholder').innerHTML = d);
        fetch('rodape.html').then(r => r.text()).then(d => document.getElementById('rodape-placeholder').innerHTML = d);
        
        // Puxa a Sidebar
        fetch('sidebar.html').then(r => r.text()).then(d => {
            const sb = document.getElementById('sidebar-placeholder');
            
            // Criamos um elemento temporário para processar o HTML da sidebar
            const temp = document.createElement('div');
            temp.innerHTML = d;
            
            // AGORA PROCURAMOS POR '.card' (que é o que você colou lá)
            const itens = Array.from(temp.querySelectorAll('.card'));
            
            // Embaralha
            itens.sort(() => Math.random() - 0.5);
            
            // Pega o título e limpa a lateral
            const tituloHtml = temp.querySelector('.sidebar-title').outerHTML;
            sb.innerHTML = tituloHtml;
            
            // Adiciona apenas 3 cards sorteados
            itens.slice(0, 3).forEach(item => {
                sb.appendChild(item);
            });
        }).catch(err => console.log("Erro ao carregar sidebar: ", err));
    }
    window.onload = incluirComponentes;
</script>
</body>
</html>
