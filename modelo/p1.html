<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Engenharia Impossível - MidiaDG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <div id="cabecalho-placeholder"></div>

    <main style="flex: 1; max-width: 1200px; margin: 30px auto; padding: 0 20px; width: 100%; box-sizing: border-box;">
        <span style="color: #03a9f4; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 10px; display: block;">Pirâmides • Parte 1 de 10</span>
        <h1>A Engenharia Impossível das Pirâmides</h1>
        <img src="https://images.pexels.com/photos/259915/pexels-photo-259915.jpeg?auto=compress&cs=tinysrgb&w=800" style="width: 100%; border-radius: 8px; margin-bottom: 25px;" alt="Pirâmides">
        
        <div style="font-size: 1.15rem; line-height: 1.8; color: #444;">
            <p>As pirâmides de Gizé desafiam a lógica moderna. Como 2,3 milhões de blocos foram movidos com precisão milimétrica?</p>
        </div>

        <a href="p2.html" style="display: block; background: #1a1a1a; color: white; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 30px;">O Mistério do Alinhamento ➔</a>
    </main>

    <div id="rodape-placeholder"></div>

    <script>
        function incluirComponentes() {
            fetch('../cabecalho.html').then(r => r.text()).then(d => document.getElementById('cabecalho-placeholder').innerHTML = d);
            fetch('../rodape.html').then(r => r.text()).then(d => document.getElementById('rodape-placeholder').innerHTML = d);
        }
        window.onload = incluirComponentes;
    </script>
