<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Engenharia Impossível - MidiaDG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cabecalho-placeholder"></div>

    <div class="main-wrapper">


        <main class="article-content">
            <span class="category-label">Pirâmides • Parte 1 de 10</span>
            <h1>A Engenharia Impossível das Pirâmides</h1>
            <img src="https://images.pexels.com/photos/259915/pexels-photo-259915.jpeg?auto=compress&cs=tinysrgb&w=800" class="featured-img" alt="Pirâmides">
            <div class="text-body">
                <p>As pirâmides de Gizé desafiam a lógica moderna. Como 2,3 milhões de blocos foram movidos com precisão milimétrica?</p>
            </div>
            <a href="p2.html" style="display: block; background: #1a1a1a; color: white; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 30px;">O Mistério do Alinhamento ➔</a>
        </main>



        <aside class="sidebar" id="sidebar-placeholder"></aside>
    </div>

    <div id="rodape-placeholder"></div>

  <script>
    async function incluirComponentes() {
        // 1. Carregar Cabeçalho
        try {
            const respCab = await fetch('cabecalho.html');
            if (respCab.ok) {
                const htmlCab = await respCab.text();
                document.getElementById('cabecalho-placeholder').innerHTML = htmlCab;
            }
        } catch (e) { console.error("Erro no cabeçalho"); }

        // 2. Carregar Rodapé
        try {
            const respRod = await fetch('rodape.html');
            if (respRod.ok) {
                const htmlRod = await respRod.text();
                document.getElementById('rodape-placeholder').innerHTML = htmlRod;
            }
        } catch (e) { console.error("Erro no rodapé"); }

        // 3. Carregar Sidebar e Sortear
        try {
            const respSid = await fetch('sidebar.html');
            if (respSid.ok) {
                const htmlSid = await respSid.text();
                const container = document.getElementById('sidebar-placeholder');
                
                // Criar um elemento temporário para ler o conteúdo
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = htmlSid;

                // Aqui está o segredo: ele aceita tanto .card quanto .sidebar-item
                const itens = Array.from(tempDiv.querySelectorAll('.card, .sidebar-item'));

                if (itens.length > 0) {
                    // Embaralha
                    itens.sort(() => Math.random() - 0.5);
                    
                    // Pega o título se existir, senão cria um
                    const tituloOriginal = tempDiv.querySelector('.sidebar-title');
                    container.innerHTML = tituloOriginal ? tituloOriginal.outerHTML : '<div class="sidebar-title">Sugestões</div>';
                    
                    // Adiciona apenas 3
                    itens.slice(0, 3).forEach(item => container.appendChild(item));
                } else {
                    // Se não tiver cards, apenas joga o conteúdo puro para não ficar branco
                    container.innerHTML = htmlSid;
                }
            }
        } catch (e) { console.error("Erro na sidebar"); }
    }

    // Executa a função
    incluirComponentes();
</script>
</body>
</html>
