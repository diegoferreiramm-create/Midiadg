<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Engenharia Impossível - MidiaDG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cabecalho-placeholder"></div>

    <div class="main-wrapper">


        <main class="article-content">
            <span class="category-label">Pirâmides • Parte 1 de 10</span>
            <h1>A Engenharia Impossível das Pirâmides</h1>
            <img src="https://images.pexels.com/photos/259915/pexels-photo-259915.jpeg?auto=compress&cs=tinysrgb&w=800" class="featured-img" alt="Pirâmides">
            <div class="text-body">
                <p>As pirâmides de Gizé desafiam a lógica moderna. Como 2,3 milhões de blocos foram movidos com precisão milimétrica?</p>
            </div>
            <a href="p2.html" style="display: block; background: #1a1a1a; color: white; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 30px;">O Mistério do Alinhamento ➔</a>
        </main>



        <aside class="sidebar" id="sidebar-placeholder"></aside>
    </div>

    <div id="rodape-placeholder"></div>

   <script>
    function incluirComponentes() {
        // Função interna para carregar cada parte
        const carregar = (arquivo, id) => {
            fetch(arquivo) // Sem '../' e sem 'modelo/'
                .then(response => {
                    if (!response.ok) throw new Error('Não achou ' + arquivo);
                    return response.text();
                })
                .then(html => {
                    const placeholder = document.getElementById(id);
                    if (placeholder) {
                        placeholder.innerHTML = html;
                        
                        // Lógica especial se for a Sidebar
                        if (id === 'sidebar-placeholder') {
                            const temp = document.createElement('div');
                            temp.innerHTML = html;
                            const cards = Array.from(temp.querySelectorAll('.card'));
                            if (cards.length > 0) {
                                cards.sort(() => Math.random() - 0.5);
                                const titulo = temp.querySelector('.sidebar-title');
                                placeholder.innerHTML = titulo ? titulo.outerHTML : '';
                                cards.slice(0, 3).forEach(c => placeholder.appendChild(c));
                            }
                        }
                    }
                })
                .catch(err => console.error('Erro 404 no arquivo:', arquivo));
        };

        // Chama os arquivos - GARANTA QUE OS NOMES ESTEJAM IGUAIS NO GITHUB
        carregar('cabecalho.html', 'cabecalho-placeholder');
        carregar('rodape.html', 'rodape-placeholder');
        carregar('sidebar.html', 'sidebar-placeholder');
    }
    window.onload = incluirComponentes;
</script>
</body>
</html>
