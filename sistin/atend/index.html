<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hudUsuario">
  <div id="dataHoraHud">00/00/0000 00:00:00</div>
  <div id="infoUsuario"></div>
  <div class="btns-hud">
    <button onclick="logout()">Sair</button>
  </div>
</div>

<div id="loginBox">
  <div class="box">
    <h2>Sistema Carteiras</h2>
    <input id="login" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
    <button class="sec" onclick="abrirSenha()">Trocar Senha</button>
    <div id="msg"></div>
  </div>
</div>

<div id="menuBox" style="display:none;">
  <div class="container">
    <div class="card" onclick="abrirTela('cadastrarBox')">Cadastrar</div>
    <div class="card" onclick="abrirTela('pesquisarBox')">Pesquisar</div>
    <div class="card" onclick="abrirTela('entregarBox')">Entregar</div>
    <div class="card" onclick="abrirTela('listasBox')">Listas</div>
  </div> 
  <div style="position: absolute; left: 30px; bottom: 30px;">
    <button onclick="abrirAdmin()" style="width: auto; background: #8b5cf6; color: white; font-size: 13px; padding: 10px 25px; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; display: flex; align-items: center; gap: 8px;">
      <span style="font-size: 15px;">⚙️</span> ÁREA ADMIN
    </button>
  </div> 
</div>

<div id="cadastrarBox" style="display:none;">
  <div class="box">
    <h2>Cadastro de Carteira</h2>
    <input id="cpf" placeholder="CPF (xxx.xxx.xxx-xx)" maxlength="14">
    <div id="msgCPF"></div>
    <input id="nome" placeholder="Nome completo">
    <input id="nascimento" type="tel" placeholder="Data de Nascimento (dd/mm/aaaa)" maxlength="10" oninput="mascaraData(this)">
    <input id="municipio" placeholder="Município">
    <input id="telefone" placeholder="Telefone (xx) xxxxx-xxxx">
    
    <div class="via-container">
      <label class="via-option">
        <input type="radio" name="via" id="via1" value="1ª" checked> 1ª Via
      </label>
      <label class="via-option">
        <input type="radio" name="via" id="via2" value="2ª"> 2ª Via
      </label>
    </div>

    <input id="codigoBoleto" placeholder="Código do boleto (OBRIGATÓRIO)">
    <button id="btnSalvar" onclick="salvarCadastro()">Salvar e Gerar Protocolo</button>
    <button class="cancel" onclick="abrirTela('menuBox')">Voltar</button>
    <div id="msgCadastro"></div>
  </div>
</div>

<div id="entregarBox" style="display:none;">
  <div class="box">
    <h2>Registrar Entrega</h2>
    <input id="codigoCtr" placeholder="Código CTR (Somente números)" inputmode="numeric">
    
    <div id="infoAlunoEntrega">
      <b>Aluno:</b> <span id="resNomeAluno">...</span><br>
      <b>CPF:</b> <span id="resCpfAluno">...</span>
    </div>

    <div class="via-container">
      <label class="via-option">
        <input type="radio" name="viaEntrega" id="via1" value="1" checked> 1ª VIA
      </label>
      <label class="via-option">
        <input type="radio" name="viaEntrega" id="via2" value="2"> 2ª VIA
      </label>
    </div>

    <div style="margin:15px 0; text-align: left; font-size: 14px; background: #0f172a; padding: 10px; border-radius: 8px;">
      <label><input type="checkbox" id="checkTerceiro" onchange="toggleTerceiro()"> Entregar para Terceiro?</label>
    </div>

    <div id="camposTerceiro" class="area-terceiro" style="opacity: 0.5;">
  <input id="nomeTerceiro" placeholder="Nome Completo do Recebedor" disabled>
  
  <input id="cpfTerceiro" placeholder="CPF do Recebedor" maxlength="14" disabled>
  <div id="msgCPFTerceiro" class="msg-cpf"></div>
  
  <div id="msgCPFTerceiro" style="font-size: 12px; margin-top: 2px; font-weight: bold;"></div>
  
  <select id="parentesco" disabled>
    <option value="">Vínculo / Parentesco</option>
    <option value="Pai/Mãe">Pai/Mãe</option>
    <option value="Irmãos/filhos">Irmãos/filhos</option>
    <option value="Tios/primos/terceiros">Tios/primos/terceiros</option>
  </select>
</div>

    <button onclick="salvarEntrega()">Confirmar e Imprimir</button>
    <button class="cancel" onclick="abrirTela('menuBox')">Voltar</button>
    <div id="msgEntrega" style="margin-top:10px; font-size:13px;"></div>
  </div>
</div>

<div id="modalSenha">
  <div>
    <h3>Trocar Senha</h3>
    <input id="usuarioTroca" placeholder="Usuário">
    <input id="senhaAtual" type="password" placeholder="Senha atual">
    <input id="novaSenha" type="password" placeholder="Nova senha">
    <input id="confSenha" type="password" placeholder="Confirmar nova senha">
    <button onclick="salvarSenha()">Salvar</button>
    <button class="cancel" onclick="fecharSenha()">Cancelar</button>
  </div>
</div>

<div id="pesquisarBox" style="display:none;">
  <div class="box" style="width: 500px;">
    <h2>Pesquisar Carteira</h2>
    <input id="valorPesquisa" placeholder="Digite CPF ou Nome para buscar">
    <div style="display:flex; gap:10px;">
      <button onclick="executarBuscaGeral('cpf')">Buscar por CPF</button>
      <button class="sec" onclick="executarBuscaGeral('nome')">Buscar por Nome</button>
    </div>
    <div id="resultadoPesquisa"></div>
    <button class="cancel" onclick="abrirTela('menuBox')">Voltar</button>
  </div>
</div>

<div id="listasBox" style="display:none; flex-direction:column; width:100%; align-items:center;">
  <div class="box" style="width: 98%; max-width: 1400px; margin: 0 auto; padding: 5px;">
    
    <h2 style="margin: 0 0 8px 0; text-align: center; font-size: 1.6rem;">Relatório Geral de Cadastros</h2>
    
    <div class="filtros-lista" style="display: flex; flex-direction: row; flex-wrap: nowrap; gap: 5px; justify-content: flex-start; align-items: center; background: #0f172a; padding: 6px; border-radius: 8px; overflow-x: auto;">
      
      <input type="text" id="fCpf" placeholder="CPF..." onkeyup="filtrarTabelaAvancado()" style="width: 130px; height: 38px; padding: 0 8px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box;">

      <input type="text" id="fNome" placeholder="NOME..." onkeyup="filtrarTabelaAvancado()" style="width: 180px; height: 38px; padding: 0 8px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box;">
      
      <select id="fStatus" onchange="filtrarTabelaAvancado()" style="width: 280px; height: 38px; padding: 0 8px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; cursor: pointer; box-sizing: border-box;">
          <option value="">STATUS (TODOS)</option>
          <option value="Pedido entregue pela Entidade à ARCE">Pedido entregue pela Entidade à ARCE</option>
          <option value="Em análise pela ARCE">Em análise pela ARCE</option>
          <option value="Solicitação Indeferida pela ARCE">Solicitação Indeferida pela ARCE</option>
          <option value="Solicitação Indeferida na Entidade Estudantil">Solicitação Indeferida na Entidade Estudantil</option>
          <option value="Aguardando Fechamento do Lote pela ARCE">Aguardando Fechamento do Lote pela ARCE</option>
          <option value="Lote Disponível para Gráfica">Lote Disponível para Gráfica</option>
          <option value="Lote Recebido pela Gráfica">Lote Recebido pela Gráfica</option>
          <option value="Lote Enviado ao Sindiônibus">Lote Enviado ao Sindiônibus</option>
          <option value="Lote Recebido pelo Sindiônibus">Lote Recebido pelo Sindiônibus</option>
          <option value="Lote Enviado para a Entidade Estudantil">Lote Enviado para a Entidade Estudantil</option>
          <option value="Lote Recebido pela Entidade Estudantil">Lote Recebido pela Entidade Estudantil</option>
          <option value="Carteira Pronta para Entrega">Carteira Pronta para Entrega</option>
          <option value="Carteira Recebida pelo Aluno">Carteira Recebida pelo Aluno</option>
      </select>

      <div id="filtrosAdmin" style="display: none; flex-direction: row; gap: 5px; align-items: center;">
        <input type="text" id="fParceiro" placeholder="PARCEIRO" onkeyup="filtrarTabelaAvancado()" style="width: 100px; height: 38px; padding: 0 8px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box;">
        <input type="text" id="fAtend" placeholder="ATENDENTE" onkeyup="filtrarTabelaAvancado()" style="width: 110px; height: 38px; padding: 0 8px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box;">
        <select id="fVia" onchange="filtrarTabelaAvancado()" style="width: 80px; height: 38px; padding: 0 8px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box;">
          <option value="">VIA</option>
          <option value="1ª">1ª Via</option>
          <option value="2ª">2ª Via</option>
        </select>
        
        <div style="display: flex; gap: 4px; align-items: center;">
          <input type="text" id="fLote" placeholder="LOTE" onkeyup="filtrarTabelaAvancado()" 
                 style="width: 70px; height: 38px; padding: 0 8px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box;">
          
          <button type="button" onclick="filtrarTabelaAvancado('#')" 
                  style="height: 38px; padding: 0 10px; border-radius: 4px; border: none; background: #3b82f6; color: white; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap;">
            VER ABERTOS
          </button>
        </div>
      </div>
    </div>
      
    <div class="tabela-container" id="areaImpressao" style="margin-top: 5px;">
      <table id="tabelaListas" style="font-size: 11px;">
        <thead>
          <tr id="cabecalhoTabela"></tr>
        </thead>
        <tbody id="corpoTabelaListas"></tbody>
      </table>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; margin-top: 10px; width: 100%; gap: 8px;">
      
      <div id="contadorLinhas" style="font-weight: bold; color: #22c55e; font-size: 13px; background: #0f172a; padding: 4px 12px; border-radius: 6px; border: 1px solid #334155;">
        Registros: <span id="numLinhas">0</span>
      </div>

      <div style="display: flex; gap: 10px; justify-content: center; width: 100%; flex-wrap: wrap;">
        
        <button onclick="fecharLotePorParceiro()" style="width: 150px; background: #ef4444; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; padding: 8px 0;">FECHAR LOTE</button>
        
        <button onclick="imprimirLista()" style="width: 150px; background: #3b82f6; margin:0; padding: 8px 0;">Imprimir Lista</button>
        
        <button class="cancel" onclick="abrirTela('menuBox')" style="width: 150px; margin:0; padding: 8px 0;">Voltar ao Menu</button>
      </div>
    </div>
  </div>
</div>
  
<div id="corrigirBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; display:none; align-items:center; justify-content:center; backdrop-filter: blur(4px);">
  <div style="width:100%; max-width:480px; background:#1e293b; border:1px solid #334155; padding:30px; border-radius:16px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
    
    <div style="text-align:center; margin-bottom:20px;">
      <h2 style="color:#eab308; margin:0; font-size:24px; letter-spacing: -0.5px;">Corrigir Registro</h2>
      <p style="color:#94a3b8; font-size:13px; margin-top:5px;">Ajuste as informações do aluno abaixo</p>
    </div>

    <div style="background:#0f172a; padding:12px; border-radius:10px; margin-bottom:20px; border:1px solid #eab308; text-align:center; position:relative;">
      <span style="position:absolute; top:-8px; left:50%; transform:translateX(-50%); background:#1e293b; padding:0 10px; color:#eab308; font-size:10px; font-weight:bold; text-transform:uppercase;">Via Atual</span>
      <div id="edit_label_via" style="color:#fff; font-weight:bold; font-size:16px; letter-spacing:1px;">---</div>
      <input type="hidden" id="edit_via_hidden">
    </div>

    <div style="display:grid; grid-template-columns: 1fr; gap:15px;">
      
      <div>
        <label style="color:#e2e8f0; font-size:12px; font-weight:600; margin-bottom:5px; display:block;">CPF</label>
        <input id="edit_cpf" style="width:100%; background:#0f172a; border:1px solid #334155; color:#fff; padding:10px; border-radius:8px; outline:none; font-size:14px;" readonly>
      </div>

      <div>
        <label style="color:#e2e8f0; font-size:12px; font-weight:600; margin-bottom:5px; display:block;">NOME COMPLETO</label>
        <input id="edit_nome" style="width:100%; background:#0f172a; border:1px solid #334155; color:#fff; padding:10px; border-radius:8px; outline:none; font-size:14px;">
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div>
          <label style="color:#e2e8f0; font-size:12px; font-weight:600; margin-bottom:5px; display:block;">NASCIMENTO</label>
          <input id="edit_nascimento" type="date" style="width:100%; background:#0f172a; border:1px solid #334155; color:#fff; padding:10px; border-radius:8px; outline:none; font-size:14px;">
        </div>
        <div>
          <label style="color:#e2e8f0; font-size:12px; font-weight:600; margin-bottom:5px; display:block;">BOLETO</label>
          <input id="edit_codigoBoleto" style="width:100%; background:#0f172a; border:1px solid #334155; color:#fff; padding:10px; border-radius:8px; outline:none; font-size:14px;">
        </div>
      </div>

      <div>
        <label style="color:#e2e8f0; font-size:12px; font-weight:600; margin-bottom:5px; display:block;">MUNICÍPIO</label>
        <input id="edit_municipio" style="width:100%; background:#0f172a; border:1px solid #334155; color:#fff; padding:10px; border-radius:8px; outline:none; font-size:14px;">
      </div>

      <div>
        <label style="color:#e2e8f0; font-size:12px; font-weight:600; margin-bottom:5px; display:block;">TELEFONE</label>
        <input id="edit_telefone" style="width:100%; background:#0f172a; border:1px solid #334155; color:#fff; padding:10px; border-radius:8px; outline:none; font-size:14px;">
      </div>

    </div>

    <div style="display:flex; gap:12px; margin-top:30px;">
      <button onclick="executarEdicao()" style="flex:1; background:#eab308; color:#000; font-weight:700; border:none; padding:14px; border-radius:10px; cursor:pointer; font-size:14px; transition: 0.2s; text-transform:uppercase;">Salvar Dados</button>
      <button onclick="document.getElementById('corrigirBox').style.display='none'" style="flex:1; background:#334155; color:#fff; font-weight:600; border:none; padding:14px; border-radius:10px; cursor:pointer; font-size:14px; transition: 0.2s;">Voltar</button>
    </div>

    <div id="msgCorrecao" style="text-align:center; margin-top:15px; font-size:13px; font-weight:bold; color:#eab308;"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
