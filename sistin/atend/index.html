<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hudUsuario">
  <div id="dataHoraHud">00/00/0000 00:00:00</div>
  <div id="infoUsuario"></div>
  <div class="btns-hud">
    <button onclick="logout()">Sair</button>
  </div>
</div>

<div id="loginBox">
  <div class="box">
    <h2>Sistema Carteiras</h2>
    <input id="login" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
    <button class="sec" onclick="abrirSenha()">Trocar Senha</button>
    <div id="msg"></div>
  </div>
</div>

<div id="menuBox" style="display:none;">
  <div class="container">
    <div class="card" onclick="abrirTela('cadastrarBox')">Cadastrar</div>
    <div class="card" onclick="abrirTela('pesquisarBox')">Pesquisar</div>
    <div class="card" onclick="abrirTela('entregarBox')">Entregar</div>
    <div class="card" onclick="abrirTela('listasBox')">Listas</div>
  </div> 
  <div style="position: absolute; left: 30px; bottom: 30px;">
    <button onclick="abrirAdmin()" style="width: auto; background: #8b5cf6; color: white; font-size: 13px; padding: 10px 25px; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; display: flex; align-items: center; gap: 8px;">
      <span style="font-size: 15px;">⚙️</span> ÁREA ADMIN
    </button>
  </div> 
</div>

<div id="cadastrarBox" style="display:none;">
  <div class="box">
    <h2>Cadastro de Carteira</h2>
    <input id="cpf" placeholder="CPF (xxx.xxx.xxx-xx)" maxlength="14">
    <div id="msgCPF"></div>
    <input id="nome" placeholder="Nome completo">
    <input id="nascimento" type="tel" placeholder="Data de Nascimento (dd/mm/aaaa)" maxlength="10" oninput="mascaraData(this)">
    <input id="municipio" placeholder="Município">
    <input id="telefone" placeholder="Telefone (xx) xxxxx-xxxx">
    
    <div class="via-container">
      <label class="via-option">
        <input type="radio" name="via" id="via1" value="1ª" checked> 1ª Via
      </label>
      <label class="via-option">
        <input type="radio" name="via" id="via2" value="2ª"> 2ª Via
      </label>
    </div>

    <input id="codigoBoleto" placeholder="Código do boleto (OBRIGATÓRIO)">
    <button id="btnSalvar" onclick="salvarCadastro()">Salvar e Gerar Protocolo</button>
    <button class="cancel" onclick="abrirTela('menuBox')">Voltar</button>
    <div id="msgCadastro"></div>
  </div>
</div>

<div id="entregarBox" style="display:none;">
  <div class="box">
    <h2>Registrar Entrega</h2>
    <input id="codigoCtr" placeholder="Código CTR (Somente números)" inputmode="numeric">
    
    <div id="infoAlunoEntrega">
      <b>Aluno:</b> <span id="resNomeAluno">...</span><br>
      <b>CPF:</b> <span id="resCpfAluno">...</span>
    </div>

    <div class="via-container">
      <label class="via-option">
        <input type="radio" name="viaEntrega" id="via1" value="1" checked> 1ª VIA
      </label>
      <label class="via-option">
        <input type="radio" name="viaEntrega" id="via2" value="2"> 2ª VIA
      </label>
    </div>

    <div style="margin:15px 0; text-align: left; font-size: 14px; background: #0f172a; padding: 10px; border-radius: 8px;">
      <label><input type="checkbox" id="checkTerceiro" onchange="toggleTerceiro()"> Entregar para Terceiro?</label>
    </div>

    <div id="camposTerceiro" class="area-terceiro" style="opacity: 0.5;">
      <input id="nomeTerceiro" placeholder="Nome Completo do Recebedor" disabled>
      <input id="cpfTerceiro" placeholder="CPF do Recebedor" maxlength="14" disabled>
      
      <select id="parentesco" disabled>
        <option value="">Vínculo / Parentesco</option>
        <option value="Pai/Mãe">Pai/Mãe</option>
        <option value="Irmãos/filhos">Irmãos/filhos</option>
        <option value="Tios/primos/terceiros">Tios/primos/terceiros</option>
      </select>
    </div>

    <button onclick="salvarEntrega()">Confirmar e Imprimir</button>
    <button class="cancel" onclick="abrirTela('menuBox')">Voltar</button>
    <div id="msgEntrega" style="margin-top:10px; font-size:13px;"></div>
  </div>
</div>

<div id="modalSenha">
  <div>
    <h3>Trocar Senha</h3>
    <input id="usuarioTroca" placeholder="Usuário">
    <input id="senhaAtual" type="password" placeholder="Senha atual">
    <input id="novaSenha" type="password" placeholder="Nova senha">
    <input id="confSenha" type="password" placeholder="Confirmar nova senha">
    <button onclick="salvarSenha()">Salvar</button>
    <button class="cancel" onclick="fecharSenha()">Cancelar</button>
  </div>
</div>

<div id="pesquisarBox" style="display:none;">
  <div class="box" style="width: 500px;">
    <h2>Pesquisar Carteira</h2>
    <input id="valorPesquisa" placeholder="Digite CPF ou Nome para buscar">
    <div style="display:flex; gap:10px;">
      <button onclick="executarBuscaGeral('cpf')">Buscar por CPF</button>
      <button class="sec" onclick="executarBuscaGeral('nome')">Buscar por Nome</button>
    </div>
    <div id="resultadoPesquisa"></div>
    <button class="cancel" onclick="abrirTela('menuBox')">Voltar</button>
  </div>
</div>

<div id="listasBox" style="display:none; flex-direction:column; width:100%; align-items:center;">
  <div class="box" style="width: 98%; max-width: 1400px; margin: 0 auto;">
    
    <h2>Relatório Geral de Cadastros</h2>
    
    <div class="filtros-lista" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; background: #0f172a; padding: 15px; border-radius: 8px;">
      <input type="text" id="fNome" placeholder="NOME..." onkeyup="filtrarTabelaAvancado()" style="width: 180px;">
      <select id="fStatus" onchange="filtrarTabelaAvancado()" style="width: 150px;">
        <option value="">STATUS (TODOS)</option>
        <option value="PENDENTE">PENDENTE</option>
        <option value="APROVADO">APROVADO</option>
        <option value="REPROVADO">REPROVADO</option>
        <option value="ENTREGUE">ENTREGUE</option>
      </select>

      <div id="filtrosAdmin" style="display: none; gap: 10px; flex-wrap: wrap;">
        <input type="text" id="fParceiro" placeholder="PARCEIRO" onkeyup="filtrarTabelaAvancado()" style="width: 110px;">
        <input type="text" id="fMun" placeholder="MUNICÍPIO" onkeyup="filtrarTabelaAvancado()" style="width: 130px;">
        <input type="text" id="fAtend" placeholder="ATENDENTE" onkeyup="filtrarTabelaAvancado()" style="width: 120px;">
        <select id="fVia" onchange="filtrarTabelaAvancado()" style="width: 100px;">
          <option value="">VIA</option>
          <option value="1ª">1ª Via</option>
          <option value="2ª">2ª Via</option>
        </select>
        <input type="text" id="fLote" placeholder="LOTE" onkeyup="filtrarTabelaAvancado()" style="width: 80px;">
        <input type="text" id="fData" placeholder="DATA" onkeyup="filtrarTabelaAvancado()" style="width: 120px;">
      </div>
    </div>
      
    <div class="tabela-container" id="areaImpressao">
      <table id="tabelaListas" style="font-size: 11px;">
        <thead>
          <tr id="cabecalhoTabela"></tr>
        </thead>
        <tbody id="corpoTabelaListas"></tbody>
      </table>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; width: 100%;">
      <div id="contadorLinhas" style="font-weight: bold; color: #22c55e; font-size: 14px; background: #0f172a; padding: 10px 15px; border-radius: 8px; border: 1px solid #334155;">
        Registros: <span id="numLinhas">0</span>
      </div>
      <div style="display: flex; gap: 15px;">
        <button onclick="imprimirLista()" style="width: 150px; background: #3b82f6; margin:0;">Imprimir Lista</button>
        <button class="cancel" onclick="abrirTela('menuBox')" style="width: 150px; margin:0;">Voltar ao Menu</button>
      </div>
    </div>
  </div>
</div>

<div id="corrigirBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; overflow-y:auto; padding: 50px 0;">
  <div class="box" style="margin: auto; position: relative; max-width: 500px; background: #1e293b; border: 2px solid #eab308; padding: 20px; border-radius: 12px;">
    <h2 style="color: #eab308; margin-bottom: 5px;">Corrigir Registro</h2>
    
    <div style="background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #334155; text-align: center;">
      <span style="color: #94a3b8; font-size: 12px; text-transform: uppercase;">Tipo de Registro:</span>
      <div id="edit_label_via" style="color: #eab308; font-weight: bold; font-size: 18px;">---</div>
    </div>

    <label style="color: #94a3b8; font-size: 11px; margin-left: 5px;">CPF:</label>
    <input id="edit_cpf" placeholder="CPF" maxlength="14">
    
    <label style="color: #94a3b8; font-size: 11px; margin-left: 5px;">NOME COMPLETO:</label>
    <input id="edit_nome" placeholder="Nome completo">
    
    <label style="color: #94a3b8; font-size: 11px; margin-left: 5px;">DATA NASCIMENTO:</label>
    <input id="edit_nascimento" type="date">
    
    <label style="color: #94a3b8; font-size: 11px; margin-left: 5px;">MUNICÍPIO:</label>
    <input id="edit_municipio" placeholder="Município">
    
    <label style="color: #94a3b8; font-size: 11px; margin-left: 5px;">TELEFONE:</label>
    <input id="edit_telefone" placeholder="Telefone">
    
    <label style="color: #94a3b8; font-size: 11px; margin-left: 5px;">CÓDIGO DO BOLETO:</label>
    <input id="edit_codigoBoleto" placeholder="Código do boleto">
    
    <input type="hidden" id="edit_via_hidden">

    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
       <button onclick="executarEdicao()" style="background: #eab308; color: black; font-weight: bold; padding: 12px; border-radius: 6px; cursor: pointer; border: none;">SALVAR ALTERAÇÕES</button>
       <button class="cancel" onclick="document.getElementById('corrigirBox').style.display='none'" style="padding: 12px; border-radius: 6px; cursor: pointer; background: #334155; color: white; border: none;">CANCELAR</button>
    </div>
    
    <div id="msgCorrecao" style="text-align: center; margin-top: 10px; color: #eab308;"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
