<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Consulte sua Carteira - Sistema de Busca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Cabeçalho com Logo -->
        <div class="header">
            <div class="logo-container">
                 <img src="https://www.midiadg.com.br/imag/logo_asesc.jpeg" alt="Logo Asesc" style="max-width: 100px; height: auto; border-radius: 8px;">
            </div>
            <h1>
                <span class="icon">🔍</span> 
                CONSULTE SUA CARTEIRA
            </h1>
            <p>Informe seus dados para verificação</p>
        </div>

        <!-- Formulário de Busca -->
        <div class="form-card">
            <form id="searchForm">
                <div class="input-group">
                    <label for="cpf">
                        <span class="label-icon">🆔</span> CPF
                    </label>
                    <input type="text" 
                           id="cpf" 
                           name="cpf" 
                           placeholder="000.000.000-00" 
                           maxlength="14"
                           autocomplete="off"
                           required>
                    <small class="input-hint">Digite apenas números ou use formatação</small>
                </div>

                <div class="input-group">
                    <label for="dataNascimento">
                        <span class="label-icon">📅</span> Data de Nascimento
                    </label>
                    <input type="text" 
                           id="dataNascimento" 
                           name="dataNascimento" 
                           placeholder="DD/MM/AAAA"
                           maxlength="10"
                           autocomplete="off"
                           required>
                    <small class="input-hint">Digite apenas números - as barras serão inseridas automaticamente</small>
                </div>

                <button type="submit" id="btnBuscar">
                    <span class="btn-icon">🔎</span>
                    Buscar Dados
                </button>
            </form>
        </div>

        <!-- Área de Resultado -->
        <div id="resultArea" class="result-area" style="display: none;">
            <div class="result-header">
                <h2>📋 Resultado da Consulta</h2>
                <button id="btnFechar" class="close-btn">✕</button>
            </div>
            <div id="resultContent" class="result-content">
                <!-- Dados carregados via JavaScript -->
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner"></div>
            <p>Consultando dados...</p>
        </div>

        <!-- Mensagens de erro/toast -->
        <div id="toastMessage" class="toast-message"></div>
    </div>


        <script>
        // Função de formatação da data
        function formatarDataInput(data) {
            let numeros = data.replace(/\D/g, '');
            if (numeros.length > 8) numeros = numeros.slice(0, 8);
            
            if (numeros.length >= 5) {
                return numeros.slice(0, 2) + '/' + numeros.slice(2, 4) + '/' + numeros.slice(4, 8);
            } else if (numeros.length >= 3) {
                return numeros.slice(0, 2) + '/' + numeros.slice(2, 4);
            } else if (numeros.length >= 2) {
                return numeros.slice(0, 2);
            }
            return numeros;
        }
    
        // Aguarda o DOM carregar
        document.addEventListener('DOMContentLoaded', function() {
            const dataInput = document.getElementById('dataNascimento');
            if (dataInput) {
                dataInput.addEventListener('input', function(e) {
                    e.target.value = formatarDataInput(e.target.value);
                });
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
