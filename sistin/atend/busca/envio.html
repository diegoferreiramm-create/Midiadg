<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envio de Documentos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .header {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            padding: 16px;
            text-align: center;
        }
        .header h1 { font-size: 1.3rem; margin-bottom: 4px; }
        .content { padding: 16px; }
        .info-box {
            background: #f0f7ff;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .info-box p { margin-bottom: 4px; }
        .info-box strong { color: #e67e22; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; color: #333; }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            background: #fafafa;
            font-size: 0.8rem;
        }
        .camera-area {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }
        .face-oval {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 220px;
            border: 3px solid #27ae60;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 0 999px rgba(0,0,0,0.5);
            display: none;
        }
        .face-oval.show { display: block; }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            text-align: center;
            font-weight: 500;
        }
        .status-success { background: #d4edda; color: #155724; }
        .status-warning { background: #fff3cd; color: #856404; }
        .status-error { background: #f8d7da; color: #721c24; }
        .status-info { background: #cce5ff; color: #004085; }
        button {
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-camera {
            background: #2c3e50;
            color: white;
            margin-top: 10px;
            width: 100%;
        }
        .btn-capture {
            background: #27ae60;
            color: white;
            margin-top: 10px;
            width: 100%;
        }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            margin-top: 16px;
        }
        .preview {
            margin-top: 12px;
            text-align: center;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        .preview img {
            max-width: 80px;
            border-radius: 12px;
            border: 3px solid #27ae60;
        }
        canvas { display: none; }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e67e22;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden { display: none; }
        .button-group { padding: 12px; background: #1a1a2e; }
        .info-text {
            background: #e9ecef;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 8px;
        }
        .opcional-badge {
            display: inline-block;
            background: #6c757d;
            color: white;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .success-msg { color: #27ae60; text-align: center; padding: 20px; }
        .error-msg { color: #ef476f; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📎 Envio de Documentos</h1>
            <p>Regularize sua situação</p>
        </div>
        <div class="content">
            <div class="info-box" id="infoUsuario"></div>
            
            <form id="formDocs">
                <div class="form-group">
                    <label>📄 Declaração de Ensino</label>
                    <input type="file" id="doc1" accept=".pdf,.jpg,.jpeg,.png">
                </div>
                <div class="form-group">
                    <label>🏠 Comprovante de Residência</label>
                    <input type="file" id="doc2" accept=".pdf,.jpg,.jpeg,.png">
                </div>
                <div class="form-group">
                    <label>🆔 Foto do CPF</label>
                    <input type="file" id="doc3" accept=".jpg,.jpeg,.png">
                </div>
                <div class="form-group" id="grupoResp">
                    <label>👨‍👩‍👧 Documento do Responsável</label>
                    <input type="file" id="doc4" accept=".pdf,.jpg,.jpeg,.png">
                </div>
                <div class="form-group">
                    <label>🤳 Selfie <span class="opcional-badge">Opcional</span></label>
                    <div class="camera-area">
                        <div class="video-wrapper">
                            <video id="video" autoplay playsinline></video>
                            <div id="faceOval" class="face-oval"></div>
                        </div>
                        <canvas id="canvas"></canvas>
                        <div class="button-group">
                            <button type="button" id="btnCamera" class="btn-camera">📷 Abrir Câmera</button>
                            <button type="button" id="btnFoto" class="btn-capture hidden">📸 Tirar Selfie</button>
                        </div>
                        <div id="statusMsg" class="status hidden"></div>
                        <div id="preview" class="preview hidden"></div>
                        <input type="hidden" id="selfieData">
                    </div>
                    <div class="info-text">
                        💡 Opcional: Tire uma selfie para agilizar a análise | Fundo claro | Rosto na moldura
                    </div>
                </div>
                <div class="form-group">
                    <label>📧 Seu E-mail</label>
                    <input type="email" id="emailUsuario" placeholder="voce@email.com" required>
                    <div class="info-text">
                        💡 Enviaremos uma cópia dos documentos para seu email
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="btn-submit">📤 Enviar Documentos</button>
            </form>
            <div id="resultMsg"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dadosUsuario = {
            cpf: urlParams.get('cpf') || '',
            nome: urlParams.get('nome') || '',
            status: urlParams.get('status') || '',
            nascimento: urlParams.get('nascimento') || ''
        };
        
        document.getElementById('infoUsuario').innerHTML = `
            <p><strong>👤 Nome:</strong> ${dadosUsuario.nome}</p>
            <p><strong>📄 CPF:</strong> ${dadosUsuario.cpf}</p>
            <p><strong>📊 Status:</strong> ${dadosUsuario.status}</p>
        `;
        
        // Verificar menor de idade
        let anoNasc = 0;
        if (dadosUsuario.nascimento.includes('/')) {
            anoNasc = parseInt(dadosUsuario.nascimento.split('/')[2]);
        } else if (dadosUsuario.nascimento.includes('-')) {
            anoNasc = parseInt(dadosUsuario.nascimento.split('-')[0]);
        }
        const idade = new Date().getFullYear() - anoNasc;
        if (idade >= 18) {
            document.getElementById('grupoResp').style.display = 'none';
        }
        
        // ==================== CÂMERA E SELFIE ====================
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnCamera = document.getElementById('btnCamera');
        const btnFoto = document.getElementById('btnFoto');
        const faceOval = document.getElementById('faceOval');
        const statusDiv = document.getElementById('statusMsg');
        const previewDiv = document.getElementById('preview');
        const selfieInput = document.getElementById('selfieData');
        let stream = null;
        
        function melhorarQualidadeImagem(ctx, width, height) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                data[i] = Math.min(255, data[i] * 1.1);
                data[i+1] = Math.min(255, data[i+1] * 1.1);
                data[i+2] = Math.min(255, data[i+2] * 1.1);
            }
            ctx.putImageData(imageData, 0, 0);
        }
        
        btnCamera.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                video.style.display = 'block';
                faceOval.classList.add('show');
                btnCamera.classList.add('hidden');
                btnFoto.classList.remove('hidden');
                statusDiv.classList.remove('hidden');
                statusDiv.className = 'status status-info';
                statusDiv.innerHTML = '🎯 Posicione o rosto na moldura (opcional)';
                await new Promise(r => setTimeout(r, 500));
            } catch(err) {
                statusDiv.className = 'status status-error';
                statusDiv.innerHTML = '❌ Erro na câmera: ' + err.message;
                statusDiv.classList.remove('hidden');
            }
        });
        
        btnFoto.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            const targetWidth = 1024;
            const targetHeight = 768;
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            ctx.drawImage(video, 0, 0, targetWidth, targetHeight);
            melhorarQualidadeImagem(ctx, targetWidth, targetHeight);
            const fotoData = canvas.toDataURL('image/jpeg', 0.85);
            selfieInput.value = fotoData;
            previewDiv.classList.remove('hidden');
            previewDiv.innerHTML = '<img src="' + fotoData + '" alt="selfie"><p style="margin-top:5px; font-size:12px; color:#27ae60;">✅ Selfie capturada!</p>';
            statusDiv.className = 'status status-success';
            statusDiv.innerHTML = '✅ Selfie capturada! (opcional)';
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.style.display = 'none';
            }
            btnFoto.classList.add('hidden');
            faceOval.classList.remove('show');
            btnCamera.classList.remove('hidden');
            btnCamera.innerHTML = '📷 Reabrir Câmera';
        });
        
        // ==================== ENVIO DOS DOCUMENTOS ====================
        document.getElementById('formDocs').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('resultMsg');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:white; margin-top:12px">Enviando documentos...</p></div>';
            
            const lerArquivo = (file) => {
                return new Promise((resolve) => {
                    if (!file || !file.name) { resolve(null); return; }
                    const reader = new FileReader();
                    reader.onload = (e) => resolve({ base64: e.target.result, nome: file.name });
                    reader.readAsDataURL(file);
                });
            };
            
            const doc1 = await lerArquivo(document.getElementById('doc1').files[0]);
            const doc2 = await lerArquivo(document.getElementById('doc2').files[0]);
            const doc3 = await lerArquivo(document.getElementById('doc3').files[0]);
            const doc4 = await lerArquivo(document.getElementById('doc4').files[0]);
            const selfie = selfieInput.value || '';  // 👈 PEGA O VALOR DO CAMPO selfieInput
            const emailUsuario = document.getElementById('emailUsuario').value;
            
            const arquivos = [];
            if (doc1) arquivos.push({ ...doc1, tipo: 'declaracao_ensino' });
            if (doc2) arquivos.push({ ...doc2, tipo: 'comprovante_residencia' });
            if (doc3) arquivos.push({ ...doc3, tipo: 'cpf_documento' });
            if (doc4) arquivos.push({ ...doc4, tipo: 'documento_responsavel' });
            
            const dadosEnvio = {
                acao: 'enviar_documentos',
                cpf: dadosUsuario.cpf,
                nome: dadosUsuario.nome,
                status: dadosUsuario.status,
                selfie: selfie,
                email: emailUsuario,  // ← ADICIONE ESTA LINHA
                arquivos: arquivos
            };
            
            try {
                const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwyJ_kQhu6934e0NQShw6AYhNLbjb2ReRtePR6V5ouUbtnpOp_aTykTYfb4cfIGXs9q/exec';
                
                const resp = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosEnvio)
                });
                
                const res = await resp.json();
                
                if (res.success) {
                    resultDiv.innerHTML = '<div class="success-msg">✅ Documentos enviados com sucesso!<br><button onclick="window.close()" style="margin-top:15px; padding:10px 20px; background:#27ae60; color:white; border:none; border-radius:8px;">Fechar</button></div>';
                } else {
                    resultDiv.innerHTML = '<div class="error-msg">❌ Erro: ' + (res.message || 'Erro desconhecido') + '</div>';
                }
            } catch(err) {
                resultDiv.innerHTML = '<div class="error-msg">❌ Erro de conexão: ' + err.message + '</div>';
            }
        });
    </script>
</body>
</html>
